<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zerenthis</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0f;
  color: white;
}

.container {
  padding: 20px;
  max-width: 800px;
  margin: auto;
}

h1 {
  text-align: center;
  color: cyan;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

input, select {
  background: #111;
  color: white;
}

button {
  background: cyan;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00dddd;
}

.card {
  background: #111;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}

.video {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Zerenthis ⚡</h1>

<input id="topic" placeholder="Enter topic..." />

<select id="mode">
  <option value="money">Money Mode</option>
  <option value="god">God Mode</option>
</select>

<select id="template">
  <option value="bold">Bold</option>
  <option value="dark">Dark</option>
  <option value="neon">Neon</option>
</select>

<button onclick="instant()">⚡ Instant Generate</button>
<button onclick="viral()">🔥 Viral Render</button>
<button onclick="shorts()">🍉 Shorts Batch</button>

<div id="output"></div>

</div>

<script>
const API = "https://semantiqai-backend-production-bcab.up.railway.app";

async function instant() {
  const topic = document.getElementById("topic").value;

  const res = await fetch(API + "/instant", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({topic})
  });

  const data = await res.json();

  document.getElementById("output").innerHTML = `
    <div class="card">
      <h3>${data.title}</h3>
      <p>${data.script.join("<br>")}</p>
    </div>
  `;
}

async function viral() {
  const topic = document.getElementById("topic").value;
  const template = document.getElementById("template").value;

  const res = await fetch(API + "/viral-render", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({topic, template})
  });

  const data = await res.json();

  document.getElementById("output").innerHTML = `
    <div class="card">
      <h3>Rendering... 🔥</h3>
      <p>Hook: ${data.hook}</p>
      <p>Score: ${data.score}</p>
      <p>Job ID: ${data.job_id}</p>
      <button onclick="checkJob('${data.job_id}')">Check Status</button>
    </div>
  `;
}

async function checkJob(id) {
  const res = await fetch(API + "/job/" + id);
  const data = await res.json();

  if (data.status === "done") {
    document.getElementById("output").innerHTML = `
      <div class="card">
        <h3>Done ✅</h3>
        <video class="video" controls src="${API + data.video_url}"></video>
      </div>
    `;
  } else {
    alert("Still processing...");
  }
}

async function shorts() {
  const topic = document.getElementById("topic").value;

  const res = await fetch(API + "/shorts", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({topic})
  });

  const data = await res.json();

  let html = `<div class="card"><h3>Shorts Batch 🍉</h3>`;

  data.items.forEach(item => {
    html += `<p><b>${item.title}</b><br>${item.script.join(" ")}</p><hr>`;
  });

  html += "</div>";

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
