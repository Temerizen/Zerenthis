<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zerenthis Studio</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0a0a0f;
  color:white;
}

.header {
  padding:20px;
  text-align:center;
  font-size:24px;
  color:cyan;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

input {
  width:100%;
  padding:14px;
  background:#111;
  border:none;
  border-radius:10px;
  color:white;
  font-size:16px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:15px;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary { background:cyan; color:black; }
.secondary { background:#222; color:white; }

.card {
  background:#111;
  margin-top:15px;
  padding:15px;
  border-radius:10px;
}

pre {
  white-space:pre-wrap;
}

video {
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

.section-title {
  margin-top:10px;
  font-size:18px;
  color:cyan;
}
</style>
</head>

<body>

<div class="header">Zerenthis Studio ⚡</div>

<div class="container">

<input id="topic" placeholder="Enter topic...">

<div class="grid">
  <button class="primary" onclick="video()">🎬 Video</button>
  <button class="secondary" onclick="shorts()">⚡ Shorts</button>
  <button class="secondary" onclick="long()">🧠 Long</button>
  <button class="secondary" onclick="ebook()">📚 Ebook</button>
  <button class="secondary" onclick="pack()">📦 Pack</button>
  <button class="primary" onclick="banana()">🍌 Banana</button>
</div>

<div id="output"></div>

</div>

<script>
const API = "https://semantiqai-backend-production-bcab.up.railway.app";

function setOutput(html){
  document.getElementById("output").innerHTML = html;
}

async function video(){
  let topic = document.getElementById("topic").value;

  let res = await fetch(API+"/video",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({topic})
  });

  let data = await res.json();

  setOutput(`
    <div class="card">
      <div class="section-title">Script</div>
      <pre>${data.script.join("\n")}</pre>
      <div id="videoBox">Rendering...</div>
    </div>
  `);

  check(data.job_id);
}

async function check(id){
  let res = await fetch(API+"/job/"+id);
  let data = await res.json();

  if(data.status==="done"){
    document.getElementById("videoBox").innerHTML =
      `<video controls autoplay src="${API + data.video_url}"></video>`;
  } else if(data.status==="error"){
    document.getElementById("videoBox").innerHTML = "Render failed";
  } else {
    setTimeout(()=>check(id),2000);
  }
}

async function shorts(){
  let topic = topicInput();
  let res = await fetch(API+"/shorts",{method:"POST",headers:json(),body:JSON.stringify({topic})});
  let data = await res.json();

  setOutput(`<div class="card"><div class="section-title">Shorts</div><pre>${data.data.join("\n")}</pre></div>`);
}

async function long(){
  let topic = topicInput();
  let res = await fetch(API+"/long",{method:"POST",headers:json(),body:JSON.stringify({topic})});
  let data = await res.json();

  setOutput(`<div class="card"><div class="section-title">Long Script</div><pre>${data.data}</pre></div>`);
}

async function ebook(){
  let topic = topicInput();
  let res = await fetch(API+"/ebook",{method:"POST",headers:json(),body:JSON.stringify({topic})});
  let data = await res.json();

  setOutput(`<div class="card"><div class="section-title">Ebook</div><pre>${data.data}</pre></div>`);
}

async function pack(){
  let topic = topicInput();
  let res = await fetch(API+"/pack",{method:"POST",headers:json(),body:JSON.stringify({topic})});
  let data = await res.json();

  setOutput(`<div class="card"><div class="section-title">Content Pack</div><pre>${JSON.stringify(data,null,2)}</pre></div>`);
}

async function banana(){
  let topic = topicInput();
  let res = await fetch(API+"/banana",{method:"POST",headers:json(),body:JSON.stringify({topic})});
  let data = await res.json();

  let html = `<div class="card"><div class="section-title">Banana Mode</div>`;

  data.batch.forEach((item,i)=>{
    html += `<pre>Angle ${i+1}:\n${JSON.stringify(item,null,2)}</pre>`;
  });

  html += `</div>`;
  setOutput(html);
}

function topicInput(){
  return document.getElementById("topic").value;
}

function json(){
  return {"Content-Type":"application/json"};
}
</script>

</body>
</html>
