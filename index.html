<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zerenthis Control Engine</title>

<style>
body{
  font-family:system-ui;
  background:#05060b;
  color:white;
  padding:20px;
}
input,select,button{
  width:100%;
  margin:8px 0;
  padding:12px;
  border-radius:10px;
  border:none;
}
button{
  background:linear-gradient(135deg,#7c4dff,#35d6ff);
  color:white;
  font-weight:bold;
}
pre{
  background:#111;
  padding:12px;
  border-radius:10px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h2>Zerenthis Founder Control Panel</h2>

<input id="topic" placeholder="Topic" value="AI automation"/>

<select id="asset">
  <option value="video">Video</option>
  <option value="ebook">Ebook</option>
  <option value="podcast">Podcast</option>
</select>

<select id="length">
  <option>5 min</option>
  <option>10 min</option>
  <option>20 min</option>
</select>

<select id="tone">
  <option>bold</option>
  <option>dramatic</option>
  <option>educational</option>
</select>

<select id="format">
  <option>standard</option>
  <option>story</option>
  <option>list</option>
</select>

<select id="visual">
  <option>modern</option>
  <option>dark cinematic</option>
  <option>fast cuts</option>
</select>

<button onclick="generate()">AUTO GENERATE</button>

<div id="output"></div>

<script>
const backend = "https://semantiqai-backend-production-bcab.up.railway.app";

function generate(){
  const topic = document.getElementById("topic").value;
  const asset = document.getElementById("asset").value;
  const length = document.getElementById("length").value;
  const tone = document.getElementById("tone").value;
  const format = document.getElementById("format").value;
  const visual = document.getElementById("visual").value;

  document.getElementById("output").innerHTML = "<pre>Generating...</pre>";

  fetch(`${backend}/generate?asset_type=${asset}&topic=${topic}&length=${length}&tone=${tone}&format_type=${format}&visual=${visual}`)
    .then(r=>r.json())
    .then(data=>{
      window.last = data;
      document.getElementById("output").innerHTML = `<pre>${JSON.stringify(data,null,2)}</pre>
      <button onclick="copy()">Copy</button>`;
    });
}

function copy(){
  navigator.clipboard.writeText(JSON.stringify(window.last,null,2));
  alert("Copied");
}
</script>

</body>
</html>
