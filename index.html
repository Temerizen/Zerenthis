<!DOCTYPE html>
<html>
<head>
  <title>Zerenthis — Content Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #05070d;
      color: white;
      font-family: Arial;
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #00e5ff;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
      background: #111;
      color: white;
    }

    button {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: #00e5ff;
      font-weight: bold;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 400px;
      margin-top: 20px;
      background: #111;
      color: white;
      padding: 15px;
      border-radius: 10px;
      border: none;
    }
  </style>
</head>

<body>

<h1>Zerenthis Content Engine</h1>

<input id="topic" placeholder="Enter product topic (ex: AI money system, fitness plan, dating guide)" />

<button onclick="generate()">Generate Premium Product</button>

<textarea id="output"></textarea>

<script>
function generate() {
  const topic = document.getElementById("topic").value;

  let content = `
🔥 ${topic.toUpperCase()} — COMPLETE SYSTEM

============================

INTRODUCTION

If you're struggling with ${topic}, this system gives you a clear, step-by-step method to start immediately.

This is not theory.
This is execution.

============================

CORE STRATEGY

You are not consuming information.
You are applying systems.

The goal is simple:
Turn ${topic} into results.

============================

SECTION 1 — FOUNDATIONS

To succeed in ${topic}, you must understand:

- Speed over perfection
- Execution over planning
- Output over learning

============================

SECTION 2 — STEP-BY-STEP SYSTEM

STEP 1:
Define your goal clearly.

STEP 2:
Use AI tools to generate ideas, scripts, or structure.

STEP 3:
Organize into a usable format.

STEP 4:
Take action immediately.

============================

SECTION 3 — TEMPLATES

TEMPLATE 1:
“Give me a complete system for ${topic} with steps, tools, and examples”

TEMPLATE 2:
“Create 20 actionable ideas for ${topic}”

TEMPLATE 3:
“Turn this into a monetizable system”

============================

SECTION 4 — EXECUTION PLAN

DAY 1:
Create your system

DAY 2:
Package it

DAY 3:
Sell it

============================

SECTION 5 — ADVANCED STRATEGY

- Focus on results people want
- Package solutions, not information
- Keep things simple and actionable

============================

SECTION 6 — SCALING

Once this works:
- Improve quality
- Increase price
- Create more products

============================

FINAL NOTE

Execution wins.

If you apply this system, you can create results using ${topic} starting today.

============================
`;

  // ADD EXTRA LENGTH (IMPORTANT)
  for (let i = 1; i <= 20; i++) {
    content += `
EXTRA INSIGHT ${i}

The key to ${topic} is consistency and action.
The more you execute, the faster you improve.
Avoid overthinking and focus on output.

`;
  }

  document.getElementById("output").value = content;
}
</script>

</body>
</html>
