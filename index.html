<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zerenthis Generator</title>
  <style>
    body { margin:0; padding:24px; background:#05070d; color:#f5f7fb; font-family:Arial,sans-serif; }
    .wrap { max-width:900px; margin:0 auto; }
    .panel { background:#0d1322; border:1px solid rgba(255,255,255,.08); border-radius:18px; padding:18px; margin-bottom:18px; }
    h1,h2 { margin-top:0; }
    .sub,.meta { color:rgba(245,247,251,.7); }
    input, textarea { width:100%; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,.08); background:#0a1120; color:#fff; margin-bottom:10px; }
    textarea { min-height:100px; resize:vertical; }
    button { padding:12px 16px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; background:#00e5ff; color:#031018; }
    pre { background:#060b15; border:1px solid rgba(255,255,255,.06); padding:14px; border-radius:14px; overflow:auto; white-space:pre-wrap; word-break:break-word; }
    a { color:#8be9fd; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Zerenthis Generator</h1>
      <div class="sub">Minimal working frontend wired only to the live product generator.</div>
      <div class="meta">Backend: <span id="backendText"></span></div>
      <div class="meta">Health: <span id="healthText">Checking...</span></div>
    </div>

    <div class="panel">
      <h2>Generate Product Pack</h2>
      <input id="topic" value="How to make money with AI in 2026" placeholder="Topic" />
      <input id="niche" value="Make Money Online" placeholder="Niche" />
      <input id="tone" value="Premium" placeholder="Tone" />
      <input id="buyer" value="Beginners starting from zero" placeholder="Buyer" />
      <input id="promise" value="get results faster" placeholder="Promise" />
      <input id="bonus" value="templates and prompts" placeholder="Bonus" />
      <textarea id="notes">Keep it practical and premium</textarea>
      <button id="generateBtn" onclick="generate()">Generate</button>
    </div>

    <div class="panel">
      <h2 id="resultTitle">Latest Result</h2>
      <div class="meta">Job ID: <span id="jobIdText">None</span></div>
      <div class="meta">Status: <span id="statusText">Idle</span></div>
      <pre id="resultBox">Waiting...</pre>
      <div id="fileLink" style="margin-top:12px;"></div>
    </div>
  </div>

  <script>
    const API = "https://semantiqai-backend-production-bcab.up.railway.app";
    let activePoll = null;
    document.getElementById("backendText").textContent = API;

    async function fetchJson(url, options = {}) {
      const res = await fetch(url, options);
      const text = await res.text();
      let data = {};
      try { data = text ? JSON.parse(text) : {}; } catch (e) { throw new Error(text || "Invalid response"); }
      if (!res.ok) throw new Error(data.detail || data.error || `Request failed: ${res.status}`);
      return data;
    }

    async function loadHealth() {
      try {
        const data = await fetchJson(`${API}/health`);
        document.getElementById("healthText").textContent = data.ok ? "Online" : "Degraded";
      } catch (err) {
        document.getElementById("healthText").textContent = "Offline";
      }
    }

    function renderFileLink(data) {
      const wrap = document.getElementById("fileLink");
      const fileUrl = data.file_url || (data.result && data.result.file_url);
      if (!fileUrl) {
        wrap.innerHTML = "";
        return;
      }
      const href = fileUrl.startsWith("http") ? fileUrl : `${API}${fileUrl.startsWith("/") ? "" : "/"}${fileUrl}`;
      wrap.innerHTML = `<a href="${href}" target="_blank" rel="noopener noreferrer">Open generated file</a>`;
    }

    async function pollJob(jobId) {
      if (activePoll) clearInterval(activePoll);
      document.getElementById("jobIdText").textContent = jobId;
      document.getElementById("statusText").textContent = "Polling";

      const check = async () => {
        try {
          const data = await fetchJson(`${API}/api/job/${jobId}`);
          document.getElementById("resultBox").textContent = JSON.stringify(data, null, 2);

          if (data.status === "completed" || data.status === "done") {
            clearInterval(activePoll);
            activePoll = null;
            document.getElementById("statusText").textContent = "Complete";
            document.getElementById("resultTitle").textContent = (data.result && data.result.title) || "Generation Complete";
            renderFileLink(data);
            return;
          }

          if (data.status === "failed" || data.error) {
            clearInterval(activePoll);
            activePoll = null;
            document.getElementById("statusText").textContent = "Failed";
            document.getElementById("resultTitle").textContent = "Generation Failed";
            return;
          }

          document.getElementById("statusText").textContent = data.status || "Queued";
        } catch (err) {
          clearInterval(activePoll);
          activePoll = null;
          document.getElementById("statusText").textContent = "Error";
          document.getElementById("resultBox").textContent = err.message;
        }
      };

      await check();
      activePoll = setInterval(check, 2500);
    }

    async function generate() {
      const btn = document.getElementById("generateBtn");
      btn.disabled = true;

      try {
        const payload = {
          topic: document.getElementById("topic").value.trim(),
          niche: document.getElementById("niche").value.trim(),
          tone: document.getElementById("tone").value.trim(),
          buyer: document.getElementById("buyer").value.trim(),
          promise: document.getElementById("promise").value.trim(),
          bonus: document.getElementById("bonus").value.trim(),
          notes: document.getElementById("notes").value.trim(),
          duration_seconds: 35
        };

        document.getElementById("resultTitle").textContent = "Submitting Generation Request";
        document.getElementById("resultBox").textContent = "Sending request...";
        document.getElementById("fileLink").innerHTML = "";
        document.getElementById("statusText").textContent = "Submitting";

        const data = await fetchJson(`${API}/api/product-pack`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        document.getElementById("resultBox").textContent = JSON.stringify(data, null, 2);

        if (data.job_id) {
          await pollJob(data.job_id);
        } else {
          document.getElementById("statusText").textContent = "Complete";
          document.getElementById("resultTitle").textContent = data.title || "Generation Complete";
          renderFileLink(data);
        }
      } catch (err) {
        document.getElementById("statusText").textContent = "Error";
        document.getElementById("resultTitle").textContent = "Generation Error";
        document.getElementById("resultBox").textContent = err.message;
      } finally {
        btn.disabled = false;
      }
    }

    loadHealth();
  </script>
</body>
</html>
