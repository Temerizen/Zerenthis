<!DOCTYPE html>
<html>
<head>
  <title>Zerenthis Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #05070d;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      color: #00e5ff;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: #111;
      color: white;
      font-size: 16px;
      margin-bottom: 15px;
    }

    button {
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .generate {
      width: 100%;
      background: #00e5ff;
      color: black;
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .tab {
      flex: 1;
      background: #1a1a1a;
      color: white;
    }

    .active {
      background: #00e5ff;
      color: black;
    }

    .output {
      background: #0d1117;
      padding: 20px;
      border-radius: 12px;
      min-height: 200px;
      white-space: pre-wrap;
    }

    textarea {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border-radius: 12px;
      background: #111;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<h1>Zerenthis Studio ⚡</h1>

<input id="idea" placeholder="Enter topic..." />

<button class="generate" onclick="generate()">Generate Product</button>

<div class="tabs">
  <button class="tab active" onclick="setTab('product')">📄 Product</button>
  <button class="tab" onclick="setTab('youtube')">🎬 YouTube</button>
  <button class="tab" onclick="setTab('shorts')">⚡ Shorts</button>
</div>

<div id="output" class="output">
  Your generated output will appear here.
</div>

<textarea placeholder="Tell AI what to improve..."></textarea>

<button style="margin-top:10px;background:#222;color:white;">
  Apply Changes
</button>

<script>
let activeTab = "product";
let result = {};

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

function render() {
  document.getElementById("output").innerText =
    result[activeTab] || "No data yet.";
}

async function generate() {
  const idea = document.getElementById("idea").value;
  if (!idea) return;

  document.getElementById("output").innerText = "Generating...";

  try {
    const res = await fetch("https://your-backend-name.up.railway.app/generate-fast", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ idea })
    });

    const data = await res.json();
    result = data;
    render();

  } catch (err) {
    document.getElementById("output").innerText = "Error connecting to AI";
  }
}
</script>

</body>
</html>
