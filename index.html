<!DOCTYPE html>
<html>
<head>
<title>Zerenthis OS</title>
<style>
body { background:#0a0a0f; color:white; font-family:Arial; padding:20px; }
button { width:100%; padding:10px; margin-top:10px; }
input { width:100%; padding:10px; }
video { width:100%; margin-top:10px; }
pre { background:#111; padding:10px; }
</style>
</head>

<body>

<h2>Zerenthis OS ⚡</h2>

<input id="topic" placeholder="Enter topic">

<button onclick="video()">🎬 Video</button>
<button onclick="shorts()">⚡ Shorts</button>
<button onclick="long()">🧠 Long Script</button>
<button onclick="ebook()">📚 Ebook</button>
<button onclick="pack()">📦 Content Pack</button>
<button onclick="banana()">🍌 Banana Mode</button>

<div id="out"></div>

<script>
const API = "https://semantiqai-backend-production-bcab.up.railway.app";

async function video(){
  let t = topic.value;
  let r = await fetch(API+"/video",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({topic:t})});
  let d = await r.json();
  out.innerHTML = d.script.join("<br>")+"<p>Rendering...</p>";
  check(d.job_id);
}

async function check(id){
  let r = await fetch(API+"/job/"+id);
  let d = await r.json();
  if(d.status==="done"){
    out.innerHTML += `<video controls src="${API+d.video_url}"></video>`;
  } else {
    setTimeout(()=>check(id),2000);
  }
}

async function shorts(){
  let r = await fetch(API+"/shorts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({topic:topic.value})});
  let d = await r.json();
  out.innerHTML = d.data.join("<br>");
}

async function long(){
  let r = await fetch(API+"/long",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({topic:topic.value})});
  let d = await r.json();
  out.innerHTML = "<pre>"+d.data+"</pre>";
}

async function ebook(){
  let r = await fetch(API+"/ebook",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({topic:topic.value})});
  let d = await r.json();
  out.innerHTML = "<pre>"+d.data+"</pre>";
}

async function pack(){
  let r = await fetch(API+"/pack",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({topic:topic.value})});
  let d = await r.json();
  out.innerHTML = "<pre>"+JSON.stringify(d,null,2)+"</pre>";
}

async function banana(){
  let r = await fetch(API+"/banana",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({topic:topic.value})});
  let d = await r.json();
  out.innerHTML = "<pre>"+JSON.stringify(d,null,2)+"</pre>";
}
</script>

</body>
</html>
