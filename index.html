<script>
const backendUrl = 'https://semantiqai-backend-production-bcab.up.railway.app';
let founderUnlocked = false;

function generateAsset() {
  const topic = document.getElementById('topicInput').value || 'AI automation';
  const type = document.getElementById('generatorType').value;
  const tone = document.getElementById('toneInput').value;

  const output = document.getElementById('factoryOutput');
  output.innerHTML = "<pre>Generating...</pre>";

  let url = `${backendUrl}/generate/${type}?topic=${encodeURIComponent(topic)}`;
  if (type === "video") {
    url += `&tone=${tone}`;
  }

  fetch(url)
    .then(res => res.json())
    .then(data => {
      window.lastGenerated = data;
      output.innerHTML = render(data);
    })
    .catch(() => {
      output.innerHTML = "<pre>Error. Backend issue.</pre>";
    });
}

function render(obj) {
  let html = '';

  for (let key in obj) {
    html += `<h3>${key}</h3>`;

    if (Array.isArray(obj[key])) {
      html += `<pre>${obj[key].join("\n\n")}</pre>`;
    } else {
      html += `<pre>${obj[key]}</pre>`;
    }
  }

  html += `
    <button onclick="copyAll()" style="margin-top:10px;">Copy All</button>
    <button onclick="downloadTxt()" style="margin-top:10px;">Download .txt</button>
  `;

  return html;
}

function copyAll() {
  const text = JSON.stringify(window.lastGenerated, null, 2);
  navigator.clipboard.writeText(text);
  alert("Copied full package");
}

function downloadTxt() {
  const text = JSON.stringify(window.lastGenerated, null, 2);
  const blob = new Blob([text], { type: "text/plain" });
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "zerenthis-output.txt";
  a.click();
}
</script>
