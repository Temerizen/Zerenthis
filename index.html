<!DOCTYPE html>
<html>
<head>
  <title>Zerenthis Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin:0;
      background:#0a0d18;
      color:white;
      font-family:Arial;
    }

    .container {
      padding:20px;
      max-width:900px;
      margin:auto;
    }

    h1 {
      color:#7c4dff;
      text-align:center;
    }

    textarea {
      width:100%;
      height:100px;
      background:#111;
      color:white;
      border:1px solid #333;
      padding:10px;
      margin-top:10px;
    }

    .buttons {
      display:flex;
      gap:10px;
      margin-top:10px;
      flex-wrap:wrap;
    }

    button {
      flex:1;
      padding:12px;
      background:#7c4dff;
      border:none;
      color:white;
      cursor:pointer;
    }

    .studio {
      margin-top:20px;
    }

    .card {
      background:#111;
      border:1px solid #333;
      padding:15px;
      margin-bottom:15px;
    }

    video {
      width:100%;
      margin-top:10px;
    }

    img {
      width:100%;
      margin-top:10px;
    }

    .label {
      color:#888;
      font-size:12px;
      margin-top:5px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Zerenthis Studio</h1>

  <textarea id="prompt" placeholder="Enter topic (e.g. AI automation)"></textarea>

  <div class="buttons">
    <button onclick="generateSingle()">Generate Video</button>
    <button onclick="generateBatch()">Auto Generate (Factory)</button>
  </div>

  <div class="studio" id="studio"></div>

</div>

<script>
const backend = "https://semantiqai-backend-production-bcab.up.railway.app";

// -------------------------
// 🎥 SINGLE VIDEO
// -------------------------
async function generateSingle() {
  const prompt = document.getElementById("prompt").value;
  const studio = document.getElementById("studio");

  studio.innerHTML = "Generating video...";

  const res = await fetch(backend + "/universal", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  studio.innerHTML = `
    <div class="card">
      <h2>${data.title}</h2>

      <div class="label">Video</div>
      <video controls src="${backend}${data.video_url}"></video>

      <div class="label">Thumbnail</div>
      <img src="${backend}${data.thumbnail_url}" />

      <div class="label">Description</div>
      <p>${data.description}</p>

      <div class="label">Hooks</div>
      <p>${(data.hooks || []).join("<br>")}</p>
    </div>
  `;
}

// -------------------------
// 🏭 BATCH FACTORY
// -------------------------
async function generateBatch() {
  const prompt = document.getElementById("prompt").value;
  const studio = document.getElementById("studio");

  studio.innerHTML = "Generating batch...";

  const res = await fetch(backend + "/factory", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      topic: prompt,
      count: 5
    })
  });

  const data = await res.json();

  let html = `<h2>Generated ${data.total} Videos</h2>`;

  data.items.forEach(item => {
    html += `
      <div class="card">
        <h3>${item.title}</h3>

        <div class="label">Video</div>
        <video controls src="${backend}${item.video_url}"></video>

        <div class="label">Thumbnail</div>
        <img src="${backend}${item.thumbnail_url}" />

        <div class="label">Hooks</div>
        <p>${item.hooks.join("<br>")}</p>
      </div>
    `;
  });

  studio.innerHTML = html;
}
</script>

</body>
</html>
