<script>
function renderResultLinks(jobData) {
  const wrap = document.getElementById("resultLinks");
  const links = [];

  const directFileUrl =
    jobData.file_url ||
    (jobData.result && jobData.result.file_url) ||
    null;

  const publicFileUrl = directFileUrl
    ? (directFileUrl.startsWith("http")
        ? directFileUrl.replace("semantiqai-backend.railway.internal", "https://semantiqai-backend-production-bcab.up.railway.app")
        : `https://semantiqai-backend-production-bcab.up.railway.app${directFileUrl.startsWith("/") ? "" : "/"}${directFileUrl}`)
    : null;

  const resultUrl = jobData.url || (jobData.result && jobData.result.url) || null;

  if (publicFileUrl) {
    links.push(
      `<a class="secondary" href="${publicFileUrl}" target="_blank" rel="noopener noreferrer" style="display:inline-block;padding:12px 16px;border-radius:12px;">Open File</a>`
    );
  }

  if (resultUrl) {
    links.push(
      `<a class="secondary" href="${resultUrl}" target="_blank" rel="noopener noreferrer" style="display:inline-block;padding:12px 16px;border-radius:12px;">Open Result</a>`
    );
  }

  wrap.innerHTML = links.join("");
}

async function pollJob(jobId) {
  if (activePoll) {
    clearInterval(activePoll);
  }

  document.getElementById("jobIdText").textContent = `Job ID: ${jobId}`;
  setResultStatus("Polling");
  setLastAction(`Polling job ${jobId}...`);

  const check = async () => {
    try {
      const data = await fetchJson(`${API}/api/job/${jobId}`);
      document.getElementById("latestResult").textContent = JSON.stringify(data, null, 2);

      const resultTitle =
        data.title ||
        (data.result && data.result.title) ||
        "Generation Complete";

      if (data.status === "done" || data.status === "completed") {
        clearInterval(activePoll);
        activePoll = null;
        setResultStatus("Complete");
        document.getElementById("resultTitle").textContent = resultTitle;
        renderResultLinks(data);
        setLastAction(`Job ${jobId} completed.`);
        await loadAll();
        return;
      }

      if (data.status === "failed" || data.status === "error" || data.status === "not_found") {
        clearInterval(activePoll);
        activePoll = null;
        setResultStatus("Failed");
        document.getElementById("resultTitle").textContent = "Generation Failed";
        setLastAction(`Job ${jobId} failed or was not found.`);
        return;
      }

      document.getElementById("resultTitle").textContent =
        data.title || (data.result && data.result.title) || "Generation In Progress";
      setResultStatus(String(data.status || "Queued"));
    } catch (err) {
      clearInterval(activePoll);
      activePoll = null;
      setResultStatus("Error");
      document.getElementById("resultTitle").textContent = "Generation Error";
      document.getElementById("latestResult").textContent = err.message;
      setLastAction(`Polling failed: ${err.message}`);
    }
  };

  await check();
  activePoll = setInterval(check, POLL_INTERVAL_MS);
}
</script>
