<!DOCTYPE html>
<html>
<head>
  <title>Zerenthis Control</title>
  <style>
    body { background:#0b0f1a; color:white; font-family:Arial; padding:20px; }
    button { padding:10px 15px; margin:5px; border:none; border-radius:8px; cursor:pointer; }
    .approve { background:#00ff88; }
    .execute { background:#00ccff; }
    .reject { background:#ff4444; }
    .card { background:#111; padding:15px; margin-bottom:10px; border-radius:10px; }
  </style>
</head>
<body>

<h1>Zerenthis Self-Improver Control</h1>
<div id="list"></div>

<script>
async function load() {
  const res = await fetch("/self/pending");
  const data = await res.json();

  const container = document.getElementById("list");
  container.innerHTML = "";

  data.reverse().forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${p.title}</h3>
      <p>${p.reason}</p>
      <button class="approve" onclick="approve('${p.id}')">Approve</button>
      <button class="execute" onclick="execute('${p.id}')">Execute</button>
      <button class="reject" onclick="reject('${p.id}')">Reject</button>
    `;

    container.appendChild(div);
  });
}

async function approve(id) {
  await fetch("/self/approve/" + id, { method: "POST" });
  load();
}

async function execute(id) {
  const res = await fetch("/self/execute/" + id, { method: "POST" });
  alert(await res.text());
  load();
}

async function reject(id) {
  await fetch("/self/reject/" + id, { method: "POST" });
  load();
}

load();
</script>

</body>
</html>
